# ==============================================
# Configuration NGINX pour le projet Inception
# NGINX sert de reverse proxy HTTPS vers WordPress
# ==============================================

server {
    # Écoute sur le port 443 (HTTPS) avec SSL activé
    listen 443 ssl;
    listen [::]:443 ssl;

    # Le nom de domaine du site
    server_name spike.42.fr;

    # Chemins vers le certificat SSL (généré dans le Dockerfile)
    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    # Protocoles SSL autorisés (TLSv1.2 et 1.3 uniquement, comme demandé par le sujet)
    ssl_protocols TLSv1.2 TLSv1.3;

    # Le dossier racine du site (les fichiers WordPress)
    root /var/www/html;

    # Fichiers à chercher par défaut quand on accède à un dossier
    index index.php index.html;

    # Pour toutes les requêtes :
    # Essaie de trouver un fichier, sinon un dossier, sinon passe à index.php
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # Pour les fichiers .php : envoie à WordPress (PHP-FPM sur le port 9000)
    location ~ \.php$ {
        # Sépare le chemin du fichier PHP des arguments
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        # Envoie la requête au conteneur "wordpress" sur le port 9000
        # "wordpress" = le nom du service dans docker-compose.yml
        # Docker résout ce nom automatiquement grâce au réseau "inception"
        fastcgi_pass wordpress:9000;

        # Fichier PHP par défaut
        fastcgi_index index.php;

        # Inclut les paramètres FastCGI standards
        include fastcgi_params;

        # Indique à PHP quel fichier exécuter
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
}
